<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GE Crop Regulation Map</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: transparent;
      padding: 4px 4px 12px 4px;
    }

    #map-container {
      position: relative;
      width: 100%;
    }

    #tooltip {
      position: absolute;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      max-width: 220px;
      z-index: 99;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #tooltip .tt-name {
      font-weight: 600;
      font-size: 13px;
      color: #111;
      margin-bottom: 3px;
    }

    #tooltip .tt-status {
      font-size: 12px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .filter-btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid #ccc;
      background: #f5f5f5;
      color: #333;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { opacity: 0.8; }

    .filter-btn.active-all {
      background: #444;
      color: #fff;
      border-color: #444;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #444;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .source-note {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
    }

    path.country { transition: opacity 0.15s; }
    path.country:hover { opacity: 0.75; }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a1a;
        color: #eee;
      }
      #tooltip {
        background: #2a2a2a;
        border-color: #444;
        color: #eee;
      }
      #tooltip .tt-name {
        color: #f0f0f0;
      }
      .filter-btn {
        background: #333;
        color: #ddd;
        border-color: #555;
      }
      .filter-btn.active-all {
        background: #aaa;
        color: #111;
        border-color: #aaa;
      }
      .legend-item {
        color: #ccc;
      }
      .source-note {
        color: #777;
      }
      .source-note a {
        color: #aaa;
      }
    }

  </style>
</head>
<body>

  <div class="filter-row" id="filter-row"></div>

  <div id="map-container">
    <svg id="map" style="width:100%; display:block;"></svg>
    <div id="tooltip"></div>
  </div>

  <div class="legend" id="legend"></div>

  <p class="source-note">
    Source: Heaton M &amp; Ngure GM, 2026, Crop Gene Editing Regulation Tracker,
    <a href="https://cropgeregulations.com" target="_blank">cropgeregulations.com</a>.
    Grey = no data / unclassified. Hover over a country to see its status.
  </p>

  <script>

    /*
     * -------------------------------------------------------
     * CONFIGURATION
     * Update DATA_URL to point to your hosted JSON file,
     * e.g. https://yourusername.github.io/blog-charts/ge-regulation-data.json
     * -------------------------------------------------------
     */
    const DATA_URL = 'ge-regulation-data.json';

    const TOPO_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';

    const STATUSES = [
      { key: 'distinct',    label: 'GE recognised as distinct from GM', color: '#3a9e3a' },
      { key: 'gm',          label: 'Regulated as GM',                   color: '#3a8fd4' },
      { key: 'changing',    label: 'Changing regulation',               color: '#e6b800' },
      { key: 'prohibited',  label: 'Prohibited',                        color: '#9b4dca' },
    ];

    const COLOR_BY_STATUS = Object.fromEntries(STATUSES.map(s => [s.key, s.color]));
    const LABEL_BY_STATUS = Object.fromEntries(STATUSES.map(s => [s.key, s.label]));
    const COLOR_NO_DATA   = '#d4d4d4';
    const COLOR_DIMMED    = '#ececec';

    let activeFilter = null;
    let geData = {};
    let allCountryPaths;
    const tooltip = document.getElementById('tooltip');

    function getColor(numericId) {
      const entry = geData[String(numericId).padStart(3, '0')];
      if (!entry) return COLOR_NO_DATA;
      if (activeFilter && entry.status !== activeFilter) return COLOR_DIMMED;
      return COLOR_BY_STATUS[entry.status] || COLOR_NO_DATA;
    }

    function getTooltipContent(numericId, topoName) {
      const entry = geData[String(numericId).padStart(3, '0')];
      const name   = (entry && entry.name) ? entry.name : topoName;
      const status = entry ? LABEL_BY_STATUS[entry.status] : 'No data / unclassified';
      const color  = entry ? (COLOR_BY_STATUS[entry.status] || '#888') : '#888';
      return `<div class="tt-name">${name}</div>
              <div class="tt-status" style="color:${color}">${status}</div>`;
    }

    function buildFilters() {
      const row = document.getElementById('filter-row');
      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active-all';
      allBtn.textContent = 'Show all';
      allBtn.addEventListener('click', () => {
        activeFilter = null;
        row.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('active-all');
          b.style.background = '';
          b.style.color = '';
          b.style.borderColor = '';
        });
        allBtn.classList.add('active-all');
        if (allCountryPaths) allCountryPaths.attr('fill', d => getColor(d.id));
      });
      row.appendChild(allBtn);

      STATUSES.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = s.label;
        btn.addEventListener('click', () => {
          activeFilter = s.key;
          row.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active-all');
            b.style.background = '';
            b.style.color = '';
            b.style.borderColor = '';
          });
          btn.style.background   = s.color;
          btn.style.color        = '#fff';
          btn.style.borderColor  = s.color;
          if (allCountryPaths) allCountryPaths.attr('fill', d => getColor(d.id));
        });
        row.appendChild(btn);
      });
    }

    function buildLegend() {
      const lg = document.getElementById('legend');
      STATUSES.forEach(s => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-swatch" style="background:${s.color}"></div><span>${s.label}</span>`;
        lg.appendChild(item);
      });
      const nodata = document.createElement('div');
      nodata.className = 'legend-item';
      nodata.innerHTML = `<div class="legend-swatch" style="background:${COLOR_NO_DATA}"></div><span>No data / unclassified</span>`;
      lg.appendChild(nodata);
    }

function buildMap(world) {
  const width  = 800;
  const height = 450;

  const svg = d3.select('#map')
    .attr('viewBox', `0 0 ${width} ${height}`)
    .style('cursor', 'grab');

  const projection = d3.geoNaturalEarth1()
    .scale(128)
    .translate([width / 2, height / 2 + 20]);

  const path = d3.geoPath(projection);
  const countries = topojson.feature(world, world.objects.countries);

  const g = svg.append('g');

  allCountryPaths = g.selectAll('path.country')
    .data(countries.features)
    .join('path')
    .attr('class', 'country')
    .attr('d', path)
    .attr('fill', d => getColor(d.id))
    .attr('stroke', '#ffffff')
    .attr('stroke-width', 0.4)
    .style('cursor', 'default')
    .on('mousemove', function(event, d) {
      tooltip.innerHTML = getTooltipContent(d.id, d.properties.name || '');
      tooltip.style.opacity = 1;
      const rect = document.getElementById('map-container').getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const tw = 220;
      tooltip.style.left = (x + 14 + tw > rect.width ? x - tw - 8 : x + 14) + 'px';
      tooltip.style.top  = Math.max(0, y - 10) + 'px';
    })
    .on('mouseleave', () => { tooltip.style.opacity = 0; });

  const zoom = d3.zoom()
    .scaleExtent([1, 8])
    .filter(event => !event.button)
    .on('zoom', (event) => {
      g.attr('transform', event.transform);
      g.selectAll('path.country')
        .attr('stroke-width', 0.4 / event.transform.k);
      svg.style('cursor', event.transform.k > 1 ? 'grabbing' : 'grab');
      d3.select('#zoom-reset')
        .style('opacity', event.transform.k > 1 ? '1' : '0');
    });

  svg.call(zoom);

  d3.select('#map-container').insert('button', '#map')
    .attr('id', 'zoom-reset')
    .text('Reset zoom')
    .style('position', 'absolute')
    .style('top', '8px')
    .style('right', '8px')
    .style('font-size', '11px')
    .style('padding', '4px 10px')
    .style('border-radius', '12px')
    .style('border', '1px solid #ccc')
    .style('background', '#fff')
    .style('cursor', 'pointer')
    .style('opacity', '0')
    .style('transition', 'opacity 0.2s')
    .on('click', () => {
      svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
    });
}

    buildFilters();
    buildLegend();

    Promise.all([
      fetch(DATA_URL).then(r => r.json()),
      d3.json(TOPO_URL)
    ]).then(([dataJson, world]) => {
      geData = dataJson.countries || {};
      buildMap(world);
    }).catch(err => {
      console.error('Failed to load map data:', err);
      document.getElementById('map-container').innerHTML =
        '<p style="color:#c00;padding:1rem;">Could not load map data. Check the DATA_URL and that the JSON file is accessible.</p>';
    });

  </script>

</body>
</html>
