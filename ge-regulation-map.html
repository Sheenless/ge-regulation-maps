<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GE Crop Regulation Map</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: transparent;
      padding: 4px 4px 12px 4px;
    }

    /* ── Search bar ── */
    #search-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    #country-search {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid #ccc;
      background: #f5f5f5;
      color: #333;
      width: 180px;
      outline: none;
      transition: border-color 0.15s;
    }

    #country-search:focus { border-color: #888; }

    #search-result {
      font-size: 12px;
      color: #555;
      min-height: 18px;
    }

    #search-clear {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1.5px solid #ccc;
      background: #f5f5f5;
      color: #555;
      cursor: pointer;
      display: none;
    }

    /* ── Filter buttons ── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .filter-btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid #ccc;
      background: #f5f5f5;
      color: #333;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { opacity: 0.8; }

    .filter-btn.active-all {
      background: #444;
      color: #fff;
      border-color: #444;
    }

    /* ── Status counts bar ── */
    #status-counts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      margin-bottom: 10px;
      min-height: 20px;
    }

    .count-item {
      font-size: 11px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .count-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .count-number { font-weight: 600; }

    /* ── Map container ── */
    #map-container {
      position: relative;
      width: 100%;
    }

    #tooltip {
      position: absolute;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      max-width: 220px;
      z-index: 99;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #tooltip .tt-name {
      font-weight: 600;
      font-size: 13px;
      color: #111;
      margin-bottom: 3px;
    }

    #tooltip .tt-status { font-size: 12px; }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #444;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── Source note ── */
    .source-note {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
    }
    .source-note a { color: #999; }

    path.country      { transition: opacity 0.15s, stroke-width 0.15s; }
    path.country:hover { opacity: 0.75; }
    path.uk-nation    { transition: opacity 0.15s, stroke-width 0.15s; }
    path.uk-nation:hover { opacity: 0.75; }

    path.country.highlighted,
    path.uk-nation.highlighted {
      stroke: #111 !important;
      stroke-width: 1.5px !important;
      opacity: 1 !important;
    }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #eee; }

      #tooltip { background: #2a2a2a; border-color: #444; color: #eee; }
      #tooltip .tt-name { color: #f0f0f0; }

      #country-search { background: #2a2a2a; border-color: #555; color: #eee; }
      #country-search:focus { border-color: #aaa; }
      #search-result { color: #aaa; }
      #search-clear { background: #2a2a2a; border-color: #555; color: #aaa; }

      .filter-btn { background: #333; color: #ddd; border-color: #555; }
      .filter-btn.active-all { background: #aaa; color: #111; border-color: #aaa; }

      .count-item { color: #aaa; }
      .legend-item { color: #ccc; }
      .source-note { color: #777; }
      .source-note a { color: #777; }

      #zoom-reset { background: #333 !important; color: #ddd !important; border-color: #555 !important; }
    }
  </style>
</head>
<body>

  <!-- Search -->
  <div id="search-row">
    <input type="text" id="country-search" placeholder="Search country…" autocomplete="off" />
    <span id="search-result"></span>
    <button id="search-clear">Clear</button>
  </div>

  <!-- Filter buttons -->
  <div class="filter-row" id="filter-row"></div>

  <!-- Status counts -->
  <div id="status-counts"></div>

  <!-- Map -->
  <div id="map-container">
    <svg id="map" style="width:100%; display:block;"></svg>
    <div id="tooltip"></div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend"></div>

  <!-- Source + last updated -->
  <p class="source-note" id="source-note">
    Source: Heaton M &amp; Ngure GM, 2026, Crop Gene Editing Regulation Tracker,
    <a href="https://cropgeregulations.com" target="_blank">cropgeregulations.com</a>.
    Grey = no data / unclassified. Hover over a country to see its status.
    UK shown by constituent nation.
  </p>

  <script>

    // ── Data sources ───────────────────────────────────────────────
    const DATA_URL = 'ge-regulation-data.json';
    const TOPO_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';

    // UK nations GeoJSON from a stable public source (Natural Earth admin-1 via geojson.io mirror).
    // This contains England, Scotland, Wales, Northern Ireland as separate features
    // with ISO 3166-2 codes in the properties.iso_3166_2 field.
    const UK_NATIONS_URL = 'https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson';

    // ── Status definitions ─────────────────────────────────────────
    const STATUSES = [
      { key: 'distinct',   label: 'GE recognised as distinct from GM', color: '#3a9e3a' },
      { key: 'gm',         label: 'Regulated as GM',                   color: '#3a8fd4' },
      { key: 'changing',   label: 'Changing regulation',               color: '#e6b800' },
      { key: 'prohibited', label: 'Prohibited',                        color: '#9b4dca' },
    ];

    const COLOR_BY_STATUS = Object.fromEntries(STATUSES.map(s => [s.key, s.color]));
    const LABEL_BY_STATUS = Object.fromEntries(STATUSES.map(s => [s.key, s.label]));
    const COLOR_NO_DATA   = '#d4d4d4';
    const COLOR_DIMMED    = '#ececec';

    let activeFilter     = null;
    let highlightedId    = null;   // numeric id OR subdivision key e.g. 'GB-ENG'
    let geData           = {};     // countries block: "032" → {name, status}
    let subdivData       = {};     // subdivisions block: "GB-ENG" → {name, status}
    let allCountryPaths;           // D3 selection of world country paths
    let allNationPaths;            // D3 selection of UK nation overlay paths
    const tooltip = document.getElementById('tooltip');

    // ── Colour helpers ─────────────────────────────────────────────

    // For world countries (looked up by numeric d.id)
    function getColor(numericId) {
      // UK sovereign (826) — suppress: the overlay layer handles it
      if (numericId === 826) return 'transparent';

      const entry = geData[String(numericId).padStart(3, '0')];
      if (!entry) return COLOR_NO_DATA;
      if (activeFilter && entry.status !== activeFilter) return COLOR_DIMMED;
      return COLOR_BY_STATUS[entry.status] || COLOR_NO_DATA;
    }

    // For UK nation overlay (looked up by ISO 3166-2 key e.g. 'GB-ENG')
    function getNationColor(isoKey) {
      const entry = subdivData[isoKey];
      if (!entry) return COLOR_NO_DATA;
      if (activeFilter && entry.status !== activeFilter) return COLOR_DIMMED;
      return COLOR_BY_STATUS[entry.status] || COLOR_NO_DATA;
    }

    // ── Tooltip helpers ────────────────────────────────────────────
    function getTooltipContent(numericId, topoName) {
      if (numericId === 826) return null; // overlay handles UK
      const entry  = geData[String(numericId).padStart(3, '0')];
      const name   = (entry && entry.name) ? entry.name : topoName;
      const status = entry ? LABEL_BY_STATUS[entry.status] : 'No data / unclassified';
      const color  = entry ? (COLOR_BY_STATUS[entry.status] || '#888') : '#888';
      return `<div class="tt-name">${name}</div>
              <div class="tt-status" style="color:${color}">${status}</div>`;
    }

    function getNationTooltipContent(isoKey) {
      const entry  = subdivData[isoKey];
      const name   = entry ? entry.name : isoKey;
      const status = entry ? LABEL_BY_STATUS[entry.status] : 'No data / unclassified';
      const color  = entry ? (COLOR_BY_STATUS[entry.status] || '#888') : '#888';
      return `<div class="tt-name">${name}</div>
              <div class="tt-status" style="color:${color}">${status}</div>`;
    }

    // ── Status counts ──────────────────────────────────────────────
    function buildCounts() {
      const container = document.getElementById('status-counts');
      container.innerHTML = '';

      const counts = {};
      STATUSES.forEach(s => { counts[s.key] = 0; });

      // Count countries (excluding UK sovereign entry if present)
      Object.entries(geData).forEach(([key, entry]) => {
        if (key === '826') return; // skip UK sovereign — counted via subdivisions
        if (counts[entry.status] !== undefined) counts[entry.status]++;
      });

      // Count UK nations from subdivisions
      Object.values(subdivData).forEach(entry => {
        if (counts[entry.status] !== undefined) counts[entry.status]++;
      });

      const toShow = activeFilter
        ? STATUSES.filter(s => s.key === activeFilter)
        : STATUSES;

      toShow.forEach(s => {
        const item = document.createElement('span');
        item.className = 'count-item';
        item.innerHTML = `
          <span class="count-dot" style="background:${s.color}"></span>
          <span class="count-number">${counts[s.key]}</span>
          <span>${s.label}</span>`;
        container.appendChild(item);
      });
    }

    // ── Filter buttons ─────────────────────────────────────────────
    function buildFilters() {
      const row = document.getElementById('filter-row');

      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active-all';
      allBtn.textContent = 'Show all';
      allBtn.addEventListener('click', () => {
        activeFilter = null;
        resetFilterButtonStyles(row, allBtn, null);
        if (allCountryPaths) allCountryPaths.attr('fill', d => getColor(d.id));
        if (allNationPaths)  allNationPaths.attr('fill', d => getNationColor(d.properties.iso_code));
        buildCounts();
      });
      row.appendChild(allBtn);

      STATUSES.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = s.label;
        btn.addEventListener('click', () => {
          activeFilter = s.key;
          resetFilterButtonStyles(row, btn, s);
          if (allCountryPaths) allCountryPaths.attr('fill', d => getColor(d.id));
          if (allNationPaths)  allNationPaths.attr('fill', d => getNationColor(d.properties.iso_code));
          buildCounts();
        });
        row.appendChild(btn);
      });
    }

    function resetFilterButtonStyles(row, activeBtn, activeStatus) {
      row.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active-all');
        b.style.background  = '';
        b.style.color       = '';
        b.style.borderColor = '';
      });
      if (activeStatus) {
        activeBtn.style.background  = activeStatus.color;
        activeBtn.style.color       = '#fff';
        activeBtn.style.borderColor = activeStatus.color;
      } else {
        activeBtn.classList.add('active-all');
      }
    }

    // ── Legend ─────────────────────────────────────────────────────
    function buildLegend() {
      const lg = document.getElementById('legend');
      STATUSES.forEach(s => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-swatch" style="background:${s.color}"></div><span>${s.label}</span>`;
        lg.appendChild(item);
      });
      const nodata = document.createElement('div');
      nodata.className = 'legend-item';
      nodata.innerHTML = `<div class="legend-swatch" style="background:${COLOR_NO_DATA}"></div><span>No data / unclassified</span>`;
      lg.appendChild(nodata);
    }

    // ── Last updated ───────────────────────────────────────────────
    function renderLastUpdated(dateStr) {
      if (!dateStr) return;
      const [y, m, d] = dateStr.split('-').map(Number);
      const formatted = new Date(y, m - 1, d)
        .toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      const note = document.getElementById('source-note');
      const span = document.createElement('span');
      span.style.marginLeft = '6px';
      span.textContent = `Data last updated: ${formatted}.`;
      note.appendChild(span);
    }

    // ── Search ─────────────────────────────────────────────────────
    function buildSearch() {
      const input    = document.getElementById('country-search');
      const resultEl = document.getElementById('search-result');
      const clearBtn = document.getElementById('search-clear');

      function doSearch(query) {
        const q = query.trim().toLowerCase();
        if (!q) { clearSearch(); return; }

        // Search subdivisions first (UK nations), then countries
        const subdivMatch = Object.entries(subdivData).find(([, entry]) =>
          entry.name.toLowerCase().includes(q)
        );

        if (subdivMatch) {
          const [isoKey, entry] = subdivMatch;
          highlightedId = isoKey;   // string key e.g. 'GB-ENG'
          resultEl.textContent = `${entry.name}: ${LABEL_BY_STATUS[entry.status] || 'No data'}`;
          resultEl.style.color = COLOR_BY_STATUS[entry.status] || '#888';
          clearBtn.style.display = 'inline-block';
          applyHighlight();
          return;
        }

        const countryMatch = Object.entries(geData).find(([, entry]) =>
          entry.name.toLowerCase().includes(q)
        );

        if (countryMatch) {
          const [idKey, entry] = countryMatch;
          highlightedId = parseInt(idKey, 10);   // numeric
          resultEl.textContent = `${entry.name}: ${LABEL_BY_STATUS[entry.status] || 'No data'}`;
          resultEl.style.color = COLOR_BY_STATUS[entry.status] || '#888';
          clearBtn.style.display = 'inline-block';
          applyHighlight();
        } else {
          highlightedId = null;
          resultEl.textContent = 'Country not found';
          resultEl.style.color = '#c00';
          clearBtn.style.display = 'inline-block';
          applyHighlight();
        }
      }

      function clearSearch() {
        highlightedId = null;
        input.value = '';
        resultEl.textContent = '';
        clearBtn.style.display = 'none';
        applyHighlight();
      }

      input.addEventListener('input', () => doSearch(input.value));
      clearBtn.addEventListener('click', clearSearch);
    }

    function applyHighlight() {
      if (allCountryPaths) {
        allCountryPaths
          .attr('fill', d => getColor(d.id))
          .classed('highlighted', d => d.id === highlightedId);
        if (typeof highlightedId === 'number') {
          allCountryPaths.filter(d => d.id === highlightedId).raise();
        }
      }
      if (allNationPaths) {
        allNationPaths
          .attr('fill', d => getNationColor(d.properties.iso_code))
          .classed('highlighted', d => d.properties.iso_code === highlightedId);
        if (typeof highlightedId === 'string') {
          allNationPaths.filter(d => d.properties.iso_code === highlightedId).raise();
        }
      }
    }

    // ── Tooltip positioning helper ─────────────────────────────────
    function showTooltip(event, html) {
      if (!html) return;
      tooltip.innerHTML = html;
      tooltip.style.opacity = 1;
      const rect = document.getElementById('map-container').getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const tw = 220;
      tooltip.style.left = (x + 14 + tw > rect.width ? x - tw - 8 : x + 14) + 'px';
      tooltip.style.top  = Math.max(0, y - 10) + 'px';
    }

    // ── Map ────────────────────────────────────────────────────────
    function buildMap(world, ukNationsGeoJSON) {
      const width  = 800;
      const height = 450;

      const svg = d3.select('#map')
        .attr('viewBox', `0 0 ${width} ${height}`)
        .style('cursor', 'grab');

      const projection = d3.geoNaturalEarth1()
        .scale(128)
        .translate([width / 2, height / 2 + 20]);

      const path = d3.geoPath(projection);
      const countries = topojson.feature(world, world.objects.countries);

      const g = svg.append('g');

      // ── Layer 1: World countries ──
      allCountryPaths = g.selectAll('path.country')
        .data(countries.features)
        .join('path')
        .attr('class', 'country')
        .attr('d', path)
        .attr('fill', d => getColor(d.id))
        .attr('stroke', '#ffffff')
        .attr('stroke-width', 0.4)
        .style('cursor', 'default')
        .on('mousemove', function(event, d) {
          const html = getTooltipContent(d.id, d.properties.name || '');
          showTooltip(event, html);
        })
        .on('mouseleave', () => { tooltip.style.opacity = 0; });

      // ── Layer 2: UK nations overlay ──
      // ukNationsGeoJSON features must have properties.iso_code set to 'GB-ENG' etc.
      if (ukNationsGeoJSON && ukNationsGeoJSON.features && ukNationsGeoJSON.features.length > 0) {
        allNationPaths = g.selectAll('path.uk-nation')
          .data(ukNationsGeoJSON.features)
          .join('path')
          .attr('class', 'uk-nation')
          .attr('d', path)
          .attr('fill', d => getNationColor(d.properties.iso_code))
          .attr('stroke', '#ffffff')
          .attr('stroke-width', 0.4)
          .style('cursor', 'default')
          .on('mousemove', function(event, d) {
            const html = getNationTooltipContent(d.properties.iso_code);
            showTooltip(event, html);
          })
          .on('mouseleave', () => { tooltip.style.opacity = 0; });
      } else {
        // Fallback: if UK overlay failed to load, render UK as a single
        // entity using the sovereign entry (826) with a note in the tooltip.
        console.warn('UK nations overlay unavailable; falling back to sovereign boundary.');
        allCountryPaths.filter(d => d.id === 826)
          .attr('fill', COLOR_NO_DATA)
          .on('mousemove', function(event) {
            showTooltip(event,
              `<div class="tt-name">United Kingdom</div>
               <div class="tt-status" style="color:#888">Nation-level data — see legend</div>`);
          });
      }

      // ── Zoom ──
      const zoom = d3.zoom()
        .scaleExtent([1, 8])
        .filter(event => !event.button)
        .on('zoom', (event) => {
          g.attr('transform', event.transform);
          g.selectAll('path.country, path.uk-nation')
            .attr('stroke-width', 0.4 / event.transform.k);
          svg.style('cursor', event.transform.k > 1 ? 'grabbing' : 'grab');
          d3.select('#zoom-reset')
            .style('opacity', event.transform.k > 1 ? '1' : '0');
        });

      svg.call(zoom);

      d3.select('#map-container').insert('button', '#map')
        .attr('id', 'zoom-reset')
        .text('Reset zoom')
        .style('position', 'absolute')
        .style('top', '8px')
        .style('right', '8px')
        .style('font-size', '11px')
        .style('padding', '4px 10px')
        .style('border-radius', '12px')
        .style('border', '1px solid #ccc')
        .style('background', '#fff')
        .style('cursor', 'pointer')
        .style('opacity', '0')
        .style('transition', 'opacity 0.2s')
        .on('click', () => {
          svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
        });

      buildCounts();
    }

    // ── UK nations GeoJSON builder ─────────────────────────────────
    // We derive the UK nations overlay from the world-atlas TopoJSON itself,
    // since the countries-110m file does not have sub-national boundaries.
    // Instead we use a curated inline GeoJSON of the four UK nations at 1:10m
    // resolution sourced from Natural Earth data. This avoids any external
    // dependency that might change or break.
    //
    // Coordinates below are simplified Natural Earth admin-1 polygons for
    // England, Scotland, Wales, and Northern Ireland.
    function buildUKNationsGeoJSON() {
      // Rather than embedding full polygon coordinates (which would be thousands
      // of vertices), we fetch from the Natural Earth / geoBoundaries CDN.
      // The property 'iso_3166_2' in Natural Earth admin-1 holds the GB-* codes.
      const NE_ADMIN1_UK_URL =
        'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_1_states_provinces_gbr.geojson';
      return fetch(NE_ADMIN1_UK_URL)
        .then(r => { if (!r.ok) throw new Error('UK GeoJSON fetch failed'); return r.json(); })
        .then(gj => {
          // Natural Earth uses iso_3166_2 field. Map to iso_code for our code.
          gj.features.forEach(f => {
            const raw = f.properties.iso_3166_2 || f.properties.iso_a2 || '';
            // raw is e.g. "GB-ENG"; assign to iso_code
            f.properties.iso_code = raw;
          });
          // Keep only features whose iso_code is in our subdivisions block
          gj.features = gj.features.filter(f =>
            Object.keys(subdivData).includes(f.properties.iso_code)
          );
          return gj;
        })
        .catch(err => {
          console.warn('Could not load UK nations GeoJSON:', err.message);
          return null;
        });
    }

    // ── Bootstrap ──────────────────────────────────────────────────
    buildFilters();
    buildLegend();
    buildSearch();

    Promise.all([
      fetch(DATA_URL).then(r => r.json()),
      d3.json(TOPO_URL)
    ]).then(([dataJson, world]) => {
      geData     = dataJson.countries     || {};
      subdivData = dataJson.subdivisions  || {};
      renderLastUpdated((dataJson._metadata || {}).last_updated);

      // Fetch UK overlay after geData/subdivData are populated
      // (filter inside buildUKNationsGeoJSON uses subdivData)
      return buildUKNationsGeoJSON().then(ukGeoJSON => {
        buildMap(world, ukGeoJSON);
      });
    }).catch(err => {
      console.error('Failed to load map data:', err);
      document.getElementById('map-container').innerHTML =
        '<p style="color:#c00;padding:1rem;">Could not load map data. Check DATA_URL and that the JSON file is accessible.</p>';
    });

  </script>
</body>
</html>
