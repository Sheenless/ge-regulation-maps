<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GE Crop Regulation Map — South America Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      background: transparent;
      padding: 4px 4px 12px 4px;
    }

    /* ── Search bar ── */
    #search-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    #country-search {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid #ccc;
      background: #f5f5f5;
      color: #333;
      width: 180px;
      outline: none;
      transition: border-color 0.15s;
    }

    #country-search:focus { border-color: #888; }

    #search-result {
      font-size: 12px;
      color: #555;
      min-height: 18px;
    }

    #search-clear {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1.5px solid #ccc;
      background: #f5f5f5;
      color: #555;
      cursor: pointer;
      display: none;
    }

    /* ── Filter buttons ── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .filter-btn {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid #ccc;
      background: #f5f5f5;
      color: #333;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { opacity: 0.8; }

    .filter-btn.active-all {
      background: #444;
      color: #fff;
      border-color: #444;
    }

    /* ── Status counts ── */
    #status-counts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      margin-bottom: 10px;
      min-height: 20px;
    }

    .count-item {
      font-size: 11px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .count-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .count-number { font-weight: 600; }

    /* ── Map container ── */
    #map-container {
      position: relative;
      width: 100%;
    }

    #tooltip {
      position: absolute;
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
      max-width: 220px;
      z-index: 99;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #tooltip .tt-name {
      font-weight: 600;
      font-size: 13px;
      color: #111;
      margin-bottom: 3px;
    }

    #tooltip .tt-status { font-size: 12px; }

    #tooltip .tt-hint {
      font-size: 10px;
      color: #aaa;
      margin-top: 4px;
    }

    /* ── Detail panel ── */
    #detail-panel {
      display: none;
      margin-top: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px 18px;
      background: #fafafa;
      position: relative;
      animation: panelFadeIn 0.2s ease;
    }

    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #detail-panel.visible { display: block; }

    #detail-close {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      color: #aaa;
      background: none;
      border: none;
      padding: 2px 6px;
    }

    #detail-close:hover { color: #333; }

    #detail-country-name {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
      padding-right: 24px;
    }

    #detail-status-badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      color: #fff;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 6px 12px;
      margin-bottom: 12px;
    }

    .detail-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding-top: 1px;
    }

    .detail-value {
      font-size: 12px;
      color: #333;
      line-height: 1.5;
    }

    .detail-value a {
      color: #3a8fd4;
      text-decoration: none;
    }

    .detail-value a:hover { text-decoration: underline; }

    #detail-summary {
      font-size: 12px;
      color: #444;
      line-height: 1.65;
      border-top: 1px solid #eee;
      padding-top: 10px;
      margin-top: 4px;
    }

    #detail-no-data {
      font-size: 12px;
      color: #888;
      font-style: italic;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 20px;
      margin-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #444;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── Source note ── */
    .source-note {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
    }

    .source-note a { color: #999; }

    path.country { transition: opacity 0.15s, stroke-width 0.15s; }
    path.country:hover { opacity: 0.75; cursor: pointer; }

    path.country.highlighted {
      stroke: #111 !important;
      stroke-width: 1.5px !important;
      opacity: 1 !important;
    }

    path.country.selected {
      stroke: #111 !important;
      stroke-width: 2px !important;
      opacity: 1 !important;
    }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #eee; }

      #tooltip {
        background: #2a2a2a;
        border-color: #444;
        color: #eee;
      }
      #tooltip .tt-name { color: #f0f0f0; }
      #tooltip .tt-hint { color: #666; }

      #country-search {
        background: #2a2a2a;
        border-color: #555;
        color: #eee;
      }
      #country-search:focus { border-color: #aaa; }
      #search-result { color: #aaa; }
      #search-clear {
        background: #2a2a2a;
        border-color: #555;
        color: #aaa;
      }

      .filter-btn {
        background: #333;
        color: #ddd;
        border-color: #555;
      }
      .filter-btn.active-all {
        background: #aaa;
        color: #111;
        border-color: #aaa;
      }

      .count-item { color: #aaa; }

      #detail-panel {
        background: #222;
        border-color: #444;
      }
      #detail-country-name { color: #f0f0f0; }
      #detail-close { color: #666; }
      #detail-close:hover { color: #ccc; }
      .detail-label { color: #666; }
      .detail-value { color: #ccc; }
      .detail-value a { color: #6ab0e0; }
      #detail-summary {
        color: #bbb;
        border-top-color: #333;
      }
      #detail-no-data { color: #666; }

      .legend-item { color: #ccc; }
      .source-note { color: #777; }
      .source-note a { color: #777; }

      #zoom-reset {
        background: #333 !important;
        color: #ddd !important;
        border-color: #555 !important;
      }
    }
  </style>
</head>
<body>

  <!-- Search -->
  <div id="search-row">
    <input type="text" id="country-search" placeholder="Search country…" autocomplete="off" />
    <span id="search-result"></span>
    <button id="search-clear">Clear</button>
  </div>

  <!-- Filter buttons -->
  <div class="filter-row" id="filter-row"></div>

  <!-- Status counts -->
  <div id="status-counts"></div>

  <!-- Map -->
  <div id="map-container">
    <svg id="map" style="width:100%; display:block;"></svg>
    <div id="tooltip"></div>
  </div>

  <!-- Country detail panel (hidden until a country is clicked) -->
  <div id="detail-panel">
    <button id="detail-close" title="Close">✕</button>
    <div id="detail-country-name"></div>
    <div id="detail-status-badge"></div>
    <div id="detail-body"></div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend"></div>

  <!-- Source + last updated -->
  <p class="source-note" id="source-note">
    Source: Heaton M &amp; Ngure GM, 2026, Crop Gene Editing Regulation Tracker,
    <a href="https://cropgeregulations.com" target="_blank">cropgeregulations.com</a>.
    Grey = no data / unclassified. Hover over a country for status; click for detail.
  </p>

  <script>

    const DATA_URL = 'ge-regulation-data-south-america-test.json';
    const TOPO_URL = 'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json';

    const STATUSES = [
      { key: 'distinct',   label: 'GE recognised as distinct from GM', color: '#3a9e3a' },
      { key: 'gm',         label: 'Regulated as GM',                   color: '#3a8fd4' },
      { key: 'changing',   label: 'Changing regulation',               color: '#e6b800' },
      { key: 'prohibited', label: 'Prohibited',                        color: '#9b4dca' },
    ];

    const COLOR_BY_STATUS = Object.fromEntries(STATUSES.map(s => [s.key, s.color]));
    const LABEL_BY_STATUS = Object.fromEntries(STATUSES.map(s => [s.key, s.label]));
    const COLOR_NO_DATA = '#d4d4d4';
    const COLOR_DIMMED  = '#ececec';

    let activeFilter  = null;
    let highlightedId = null;
    let selectedId    = null;
    let geData        = {};
    let allCountryPaths;

    const tooltip = document.getElementById('tooltip');

    // ── Colour logic ──────────────────────────────────────────────
    function getColor(numericId) {
      const entry = geData[String(numericId).padStart(3, '0')];
      if (!entry) return COLOR_NO_DATA;
      if (activeFilter && entry.status !== activeFilter) return COLOR_DIMMED;
      return COLOR_BY_STATUS[entry.status] || COLOR_NO_DATA;
    }

    function hasDetail(entry) {
      return entry && (entry.legislation || entry.summary || entry.regulatory_body);
    }

    function getTooltipContent(numericId, topoName) {
      const entry  = geData[String(numericId).padStart(3, '0')];
      const name   = (entry && entry.name) ? entry.name : topoName;
      const status = entry ? LABEL_BY_STATUS[entry.status] : 'No data / unclassified';
      const color  = entry ? (COLOR_BY_STATUS[entry.status] || '#888') : '#888';
      const hint   = hasDetail(entry) ? '<div class="tt-hint">Click for detail</div>' : '';
      return `<div class="tt-name">${name}</div>
              <div class="tt-status" style="color:${color}">${status}</div>
              ${hint}`;
    }

    // ── Detail panel ───────────────────────────────────────────────
    function openDetailPanel(numericId, topoName) {
      const idKey  = String(numericId).padStart(3, '0');
      const entry  = geData[idKey];
      const panel  = document.getElementById('detail-panel');
      const nameEl = document.getElementById('detail-country-name');
      const badge  = document.getElementById('detail-status-badge');
      const body   = document.getElementById('detail-body');

      const name = (entry && entry.name) ? entry.name : topoName;
      nameEl.textContent = name;

      if (entry) {
        const color  = COLOR_BY_STATUS[entry.status] || '#888';
        const label  = LABEL_BY_STATUS[entry.status] || 'Unknown';
        badge.textContent        = label;
        badge.style.background   = color;
        badge.style.display      = 'inline-block';

        if (hasDetail(entry)) {
          // Build the detail grid rows
          const rows = [];

          if (entry.regulatory_body) {
            rows.push(['Regulatory body', entry.regulatory_body]);
          }
          if (entry.year_established) {
            rows.push(['Framework year', entry.year_established]);
          }
          if (entry.legislation) {
            const legText = entry.legislation_url
              ? `<a href="${entry.legislation_url}" target="_blank">${entry.legislation}</a>`
              : entry.legislation;
            rows.push(['Key legislation', legText]);
          }
          if (entry.approach) {
            rows.push(['Approach', entry.approach]);
          }

          let gridHTML = '<div class="detail-grid">';
          rows.forEach(([label, value]) => {
            gridHTML += `<span class="detail-label">${label}</span>
                         <span class="detail-value">${value}</span>`;
          });
          gridHTML += '</div>';

          let summaryHTML = '';
          if (entry.summary) {
            summaryHTML = `<div id="detail-summary">${entry.summary}`;
            if (entry.further_reading_url) {
              summaryHTML += ` <a href="${entry.further_reading_url}" target="_blank">Further reading →</a>`;
            }
            summaryHTML += '</div>';
          }

          body.innerHTML = gridHTML + summaryHTML;

        } else {
          body.innerHTML = '<p id="detail-no-data">No detailed information available for this country yet.</p>';
        }

      } else {
        badge.style.display = 'none';
        body.innerHTML = '<p id="detail-no-data">No data or unclassified.</p>';
      }

      panel.classList.add('visible');

      // Scroll panel into view smoothly if below the fold
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function closeDetailPanel() {
      document.getElementById('detail-panel').classList.remove('visible');
      selectedId = null;
      if (allCountryPaths) {
        allCountryPaths.classed('selected', false);
      }
    }

    document.getElementById('detail-close').addEventListener('click', closeDetailPanel);

    // ── Status counts ──────────────────────────────────────────────
    function buildCounts() {
      const container = document.getElementById('status-counts');
      container.innerHTML = '';
      const counts = {};
      STATUSES.forEach(s => { counts[s.key] = 0; });
      Object.values(geData).forEach(entry => {
        if (counts[entry.status] !== undefined) counts[entry.status]++;
      });
      const toShow = activeFilter
        ? STATUSES.filter(s => s.key === activeFilter)
        : STATUSES;
      toShow.forEach(s => {
        const item = document.createElement('span');
        item.className = 'count-item';
        item.innerHTML = `
          <span class="count-dot" style="background:${s.color}"></span>
          <span class="count-number">${counts[s.key]}</span>
          <span>${s.label}</span>`;
        container.appendChild(item);
      });
    }

    // ── Filter buttons ─────────────────────────────────────────────
    function buildFilters() {
      const row = document.getElementById('filter-row');

      const allBtn = document.createElement('button');
      allBtn.className = 'filter-btn active-all';
      allBtn.textContent = 'Show all';
      allBtn.addEventListener('click', () => {
        activeFilter = null;
        resetFilterButtonStyles(row, allBtn, null);
        if (allCountryPaths) allCountryPaths.attr('fill', d => getColor(d.id));
        buildCounts();
      });
      row.appendChild(allBtn);

      STATUSES.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = s.label;
        btn.addEventListener('click', () => {
          activeFilter = s.key;
          resetFilterButtonStyles(row, btn, s);
          if (allCountryPaths) allCountryPaths.attr('fill', d => getColor(d.id));
          buildCounts();
        });
        row.appendChild(btn);
      });
    }

    function resetFilterButtonStyles(row, activeBtn, activeStatus) {
      row.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active-all');
        b.style.background  = '';
        b.style.color       = '';
        b.style.borderColor = '';
      });
      if (activeStatus) {
        activeBtn.style.background  = activeStatus.color;
        activeBtn.style.color       = '#fff';
        activeBtn.style.borderColor = activeStatus.color;
      } else {
        activeBtn.classList.add('active-all');
      }
    }

    // ── Legend ─────────────────────────────────────────────────────
    function buildLegend() {
      const lg = document.getElementById('legend');
      STATUSES.forEach(s => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<div class="legend-swatch" style="background:${s.color}"></div><span>${s.label}</span>`;
        lg.appendChild(item);
      });
      const nodata = document.createElement('div');
      nodata.className = 'legend-item';
      nodata.innerHTML = `<div class="legend-swatch" style="background:${COLOR_NO_DATA}"></div><span>No data / unclassified</span>`;
      lg.appendChild(nodata);
    }

    // ── Last updated ───────────────────────────────────────────────
    function renderLastUpdated(dateStr) {
      if (!dateStr) return;
      const [y, m, d] = dateStr.split('-').map(Number);
      const formatted = new Date(y, m - 1, d)
        .toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
      const note = document.getElementById('source-note');
      const span = document.createElement('span');
      span.style.marginLeft = '6px';
      span.textContent = `Data last updated: ${formatted}.`;
      note.appendChild(span);
    }

    // ── Search ─────────────────────────────────────────────────────
    function buildSearch() {
      const input    = document.getElementById('country-search');
      const resultEl = document.getElementById('search-result');
      const clearBtn = document.getElementById('search-clear');

      function doSearch(query) {
        const q = query.trim().toLowerCase();
        if (!q) { clearSearch(); return; }
        const match = Object.entries(geData).find(([, entry]) =>
          entry.name.toLowerCase().includes(q)
        );
        if (match) {
          const [idKey, entry] = match;
          highlightedId = parseInt(idKey, 10);
          resultEl.textContent = `${entry.name}: ${LABEL_BY_STATUS[entry.status] || 'No data'}`;
          resultEl.style.color = COLOR_BY_STATUS[entry.status] || '#888';
          clearBtn.style.display = 'inline-block';
          applyHighlight();
        } else {
          highlightedId = null;
          resultEl.textContent = 'Country not found';
          resultEl.style.color = '#c00';
          clearBtn.style.display = 'inline-block';
          applyHighlight();
        }
      }

      function clearSearch() {
        highlightedId = null;
        input.value = '';
        resultEl.textContent = '';
        clearBtn.style.display = 'none';
        applyHighlight();
      }

      input.addEventListener('input', () => doSearch(input.value));
      clearBtn.addEventListener('click', clearSearch);
    }

    function applyHighlight() {
      if (!allCountryPaths) return;
      allCountryPaths
        .attr('fill', d => getColor(d.id))
        .classed('highlighted', d => d.id === highlightedId && d.id !== selectedId);
      if (highlightedId !== null) {
        allCountryPaths.filter(d => d.id === highlightedId).raise();
      }
    }

    // ── Map ────────────────────────────────────────────────────────
    function buildMap(world) {
      const width  = 800;
      const height = 450;

      const svg = d3.select('#map')
        .attr('viewBox', `0 0 ${width} ${height}`)
        .style('cursor', 'grab');

      const projection = d3.geoNaturalEarth1()
        .scale(128)
        .translate([width / 2, height / 2 + 20]);

      const path = d3.geoPath(projection);
      const countries = topojson.feature(world, world.objects.countries);

      const g = svg.append('g');

      allCountryPaths = g.selectAll('path.country')
        .data(countries.features)
        .join('path')
        .attr('class', 'country')
        .attr('d', path)
        .attr('fill', d => getColor(d.id))
        .attr('stroke', '#ffffff')
        .attr('stroke-width', 0.4)
        .on('mousemove', function(event, d) {
          tooltip.innerHTML = getTooltipContent(d.id, d.properties.name || '');
          tooltip.style.opacity = 1;
          const rect = document.getElementById('map-container').getBoundingClientRect();
          const x = event.clientX - rect.left;
          const y = event.clientY - rect.top;
          const tw = 220;
          tooltip.style.left = (x + 14 + tw > rect.width ? x - tw - 8 : x + 14) + 'px';
          tooltip.style.top  = Math.max(0, y - 10) + 'px';
        })
        .on('mouseleave', () => { tooltip.style.opacity = 0; })
        .on('click', function(event, d) {
          // Don't fire if the user was dragging (panning the map)
          if (event.defaultPrevented) return;

          tooltip.style.opacity = 0;

          // Deselect if clicking the same country again
          if (selectedId === d.id) {
            closeDetailPanel();
            return;
          }

          // Clear previous selection styling
          allCountryPaths.classed('selected', false);

          selectedId = d.id;
          d3.select(this).classed('selected', true).raise();

          openDetailPanel(d.id, d.properties.name || '');
        });

      // Zoom
      const zoom = d3.zoom()
        .scaleExtent([1, 8])
        .filter(event => !event.button)
        .on('zoom', (event) => {
          g.attr('transform', event.transform);
          g.selectAll('path.country')
            .attr('stroke-width', 0.4 / event.transform.k);
          svg.style('cursor', event.transform.k > 1 ? 'grabbing' : 'grab');
          d3.select('#zoom-reset')
            .style('opacity', event.transform.k > 1 ? '1' : '0');
        });

      svg.call(zoom);

      // Reset zoom button
      d3.select('#map-container').insert('button', '#map')
        .attr('id', 'zoom-reset')
        .text('Reset zoom')
        .style('position', 'absolute')
        .style('top', '8px')
        .style('right', '8px')
        .style('font-size', '11px')
        .style('padding', '4px 10px')
        .style('border-radius', '12px')
        .style('border', '1px solid #ccc')
        .style('background', '#fff')
        .style('cursor', 'pointer')
        .style('opacity', '0')
        .style('transition', 'opacity 0.2s')
        .on('click', () => {
          svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
        });

      buildCounts();
    }

    // ── Bootstrap ──────────────────────────────────────────────────
    buildFilters();
    buildLegend();
    buildSearch();

    Promise.all([
      fetch(DATA_URL).then(r => r.json()),
      d3.json(TOPO_URL)
    ]).then(([dataJson, world]) => {
      geData = dataJson.countries || {};
      renderLastUpdated((dataJson._metadata || {}).last_updated);
      buildMap(world);
    }).catch(err => {
      console.error('Failed to load map data:', err);
      document.getElementById('map-container').innerHTML =
        '<p style="color:#c00;padding:1rem;">Could not load map data. Check the DATA_URL and that the JSON file is accessible.</p>';
    });

  </script>

</body>
</html>
